<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dot Follow Effect</title>
    <!-- Use a modern font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0b0f19; /* Very dark blue, premium feel */
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            cursor: none; /* Hide default cursor to show our custom one */
        }

        .content {
            text-align: center;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through to canvas */
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #18cde6, #802bea);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            color: #94a3b8;
            font-size: 1.25rem;
            font-weight: 300;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Move Your Mouse</h1>
        <p>Creating dynamic web experiences is easier than you think.</p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let mouse = { x: null, y: null };

        // Configuration for the dots
        const numDots = 25;
        const dots = [];

        // Resize the canvas to fill browser window dynamically
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // Re-center mouse if it doesn't have a coordinate yet
            if (mouse.x === null) {
                mouse.x = width / 2;
                mouse.y = height / 2;
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // Track mouse position
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });
        
        // Support touch devices 
        window.addEventListener('touchmove', (e) => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        // Initialize the dots
        for (let i = 0; i < numDots; i++) {
            dots.push({
                x: width / 2,
                y: height / 2,
                // Make the leading dot slightly larger, scaling down the tail
                size: Math.max(0.5, (numDots - i) * 0.4 + 2) 
            });
        }

        // Animation Loop
        function animate() {
            ctx.clearRect(0, 0, width, height);

            // The target for the very first dot is the mouse cursor
            let targetX = mouse.x;
            let targetY = mouse.y;

            for (let i = 0; i < numDots; i++) {
                const dot = dots[i];
                
                // Spring physics calculation for smooth dragging effect
                // The larger the decimal, the "tighter" the spring (less lag)
                dot.x += (targetX - dot.x) * 0.35; 
                dot.y += (targetY - dot.y) * 0.35;

                // Color calculation: transitioning from vibrant blue to deep purple
                // based on position in the tail
                const hue = 190 + (i / numDots) * 70; // 190 (cyan/blue) to ~260 (purple)
                const alpha = 1 - (i / numDots) * 0.8; // Fades out towards the end
                
                ctx.fillStyle = `hsla(${hue}, 100%, 65%, ${alpha})`;
                ctx.beginPath();
                ctx.arc(dot.x, dot.y, dot.size, 0, Math.PI * 2);
                ctx.fill();

                // The next dot's target is the current dot's updated position
                targetX = dot.x;
                targetY = dot.y;
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
